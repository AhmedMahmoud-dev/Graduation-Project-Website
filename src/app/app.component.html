<router-outlet></router-outlet>
<app-toast-container></app-toast-container>

@if (isLoggingOut()) {
  <div class="fixed inset-0 z-[9999] bg-[color:var(--bg-primary)] backdrop-blur-sm flex items-center justify-center">
    <app-loading-state
      message="Logging Out..."
      subtitle="Clearing your secure session and credentials"
      size="lg"
      [fullPage]="true">
    </app-loading-state>
  </div>
}
