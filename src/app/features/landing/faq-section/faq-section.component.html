<section id="faq" class="py-16 md:py-24 lg:py-32 px-4 xs:px-6 lg:px-12 bg-[color:var(--color-bg)] text-[color:var(--color-text)]">
  <div class="max-w-[720px] mx-auto w-full">
    <!-- Section Header -->
    <div class="text-center mb-10 sm:mb-14">
      <h2
        id="faq-heading"
        class="text-2xl xs:text-3xl sm:text-4xl md:text-5xl font-black text-[color:var(--color-text)] tracking-tight mb-4">
        Frequently Asked Questions
      </h2>
      <p class="text-sm xs:text-base sm:text-lg text-[color:var(--color-text-muted)] font-medium leading-relaxed max-w-lg mx-auto">
        Everything you need to know about Emotra and how it works.
      </p>
    </div>

    <!-- FAQ Accordion wrapped in a card -->
    <div class="bg-[color:var(--color-surface)] border border-[color:var(--color-border)] rounded-3xl p-4 xs:p-6 sm:p-8">
      <div class="flex flex-col">
        @for (item of faqs; track item.question; let i = $index) {
          <div [class.border-b]="i < faqs.length - 1" class="border-[color:var(--color-border)] py-4 sm:py-5">
            <button
              [id]="'faq-btn-' + i"
              type="button"
              class="w-full flex items-center justify-between text-left py-1 group focus:outline-none gap-4"
              (click)="toggle(i)">
              <span
                class="text-sm xs:text-base sm:text-lg font-bold transition-colors"
                [class.text-[color:var(--color-primary)]]="activeIndex() === i"
                [class.text-[color:var(--color-text)]]="activeIndex() !== i">
                {{ item.question }}
              </span>
              <div
                class="w-8 h-8 rounded-full shrink-0 flex items-center justify-center transition-colors"
                [class.bg-[color:color-mix(in_srgb,var(--color-primary),transparent_88%)]]="activeIndex() === i"
                [class.bg-[color:var(--color-bg)]]="activeIndex() !== i">
                <svg
                  class="w-4 h-4 shrink-0 transition-transform duration-300 transform"
                  [class.rotate-180]="activeIndex() === i"
                  [class.text-[color:var(--color-primary)]]="activeIndex() === i"
                  [class.text-[color:var(--color-text-muted)]]="activeIndex() !== i"
                  fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                </svg>
              </div>
            </button>

            <div
              [id]="'faq-content-' + i"
              class="overflow-hidden transition-all duration-300 ease-in-out"
              [style.max-height]="activeIndex() === i ? '500px' : '0px'">
              <div class="pb-2 pt-3 text-sm sm:text-base text-[color:var(--color-text-muted)] font-medium leading-relaxed">
                {{ item.answer }}
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
