<div class="min-h-screen bg-[color:var(--bg-primary)] text-[color:var(--text-primary)] flex">
  <!-- Main Sidebar Layer -->
  <app-app-sidebar #sidebar></app-app-sidebar>

  <!-- Main Content Area -->
  <main
    class="flex-1 flex flex-col min-h-screen transition-[margin] duration-300 ease-[cubic-bezier(0.4,0,0.2,1)] will-change-[margin]"
    [style.margin-left]="'var(--app-sidebar-width, 0px)'">

    <app-app-navbar (toggleMenu)="sidebar.toggleMobile()"></app-app-navbar>

    <!-- <app-testimonials-section></app-testimonials-section> -->
    <app-hero-section></app-hero-section>
    <app-features-section></app-features-section>
    <app-how-it-works-section></app-how-it-works-section>
    <app-testimonials-section></app-testimonials-section>
    <app-pricing-section></app-pricing-section>
    <app-faq-section></app-faq-section>
    <app-footer-section></app-footer-section>
    <app-system-feedback></app-system-feedback>

  </main>
</div>
