<section id="how-it-works"
  class="py-16 sm:py-24 md:py-32 px-4 xs:px-6 lg:px-12 bg-[color:var(--color-bg)] text-[color:var(--color-text)]">
  <div class="max-w-7xl mx-auto flex flex-col w-full">
    <!-- Section Header -->
    <div class="text-center mb-12 sm:mb-16 md:mb-24 px-4 w-full">
      <h2
        id="how-it-works-heading"
        class="text-2xl xs:text-3xl sm:text-4xl md:text-5xl font-black text-[color:var(--color-text)] tracking-tight mb-4 sm:mb-6 break-words w-full">
        Simple as 1-2-3.
      </h2>
      <p
        id="how-it-works-subheading"
        class="text-sm xs:text-base sm:text-lg md:text-xl text-[color:var(--color-text-muted)] font-medium max-w-2xl mx-auto leading-relaxed">
        Our platform simplifies the complex science of sentiment analysis into an intuitive, seamless experience.
      </p>
    </div>

    <!-- Steps Timeline -->
    <div class="relative grid grid-cols-1 md:grid-cols-3 gap-10 sm:gap-12 md:gap-8 w-full">

      @for (step of steps; track step.number) {
      <div
        [id]="'how-it-works-step-' + step.number"
        class="relative flex flex-col items-center text-center px-4 z-10 w-full">

        <!-- Step Number with brand tint -->
        <div
          class="w-16 h-16 shrink-0 rounded-2xl bg-[color:color-mix(in_srgb,var(--brand-primary),transparent_88%)] border border-[color:color-mix(in_srgb,var(--brand-primary),transparent_70%)] flex items-center justify-center text-[color:var(--brand-primary)] font-black text-2xl mb-4 shadow-[0_8px_24px_color-mix(in_srgb,var(--brand-primary),transparent_85%)]">
          {{ step.number }}
        </div>

        <!-- Step Icon -->
        <div class="w-10 h-10 shrink-0 mb-4 sm:mb-6 text-[color:var(--color-text-muted)]">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path [attr.d]="step.icon" />
          </svg>
        </div>

        <h3 class="text-base xs:text-lg sm:text-xl font-bold text-[color:var(--color-text)] mb-3 sm:mb-4">{{ step.title }}</h3>
        <p class="text-[color:var(--color-text-muted)] text-sm leading-relaxed max-w-sm font-medium">
          {{ step.description }}
        </p>

        <!-- Connectors -->
        @if (step.number < steps.length) {
        <!-- Mobile vertical dashed line -->
        <div class="md:hidden w-px h-10 border-l-2 border-dashed border-[color:var(--color-border)] mt-6"></div>
        
        <!-- Desktop Chevron Arrow (positioned in the gap between columns) -->
        <div class="hidden md:flex absolute top-8 -right-4 sm:-right-6 w-8 h-8 items-center justify-center text-[color:var(--color-border)] translate-x-1/2">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
          </svg>
        </div>
        }
      </div>
      }

    </div>
  </div>
</section>
