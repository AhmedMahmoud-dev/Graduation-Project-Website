<div class="min-h-screen bg-[color:var(--bg-primary)] text-[color:var(--text-primary)] flex flex-col">
  <!-- Top Padding for fixed Navbar -->
  <div class="h-16 lg:h-20"></div>

  <div class="w-full px-4 sm:px-6 lg:px-6 py-8 sm:py-10">
    <!-- Breadcrumb -->
    <!-- Breadcrumb -->
    <div class="mb-12 max-w-7xl mx-auto">
      <nav class="flex flex-wrap items-center gap-2 text-sm font-medium text-[color:var(--text-muted)] mb-6">
        <a routerLink="/" class="text-[color:var(--brand-primary)]">Home</a>
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
        <span>Models</span>
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
        </svg>
        <span class="text-[color:var(--text-primary)]">Audio Analysis</span>
      </nav>

      <div class="flex flex-col min-[1260px]:flex-row min-[1260px]:items-end min-[1260px]:justify-between gap-8">
        <div class="max-w-3xl">
          <h1 class="text-3xl sm:text-4xl lg:text-6xl font-extrabold tracking-tight mb-4 leading-tight">
            Audio Emotion Model
          </h1>
          <p class="text-base sm:text-lg text-[color:var(--text-muted)] leading-relaxed max-w-2xl font-medium">
            How Emotra combines deep acoustic features with semantic context to decode human emotion from voice
            recordings.
          </p>
        </div>

        <!-- Version Switcher -->
        <div class="flex flex-col gap-3 shrink-0 min-[1260px]:w-auto w-fit max-w-full">
          <span
            class="hidden min-[1260px]:block text-xs font-black uppercase tracking-widest text-[color:var(--text-muted)] opacity-60 ml-1">Documentation
            Version</span>
          <app-segmented-nav 
            [options]="navOptions" 
            [selectedValue]="selectedVersion()" 
            (selectedValueChange)="setVersion($event === 'v1' ? 'v1' : 'v2')">
          </app-segmented-nav>
        </div>
      </div>
    </div>

    <!-- Divider -->
    <div
      class="max-w-7xl mx-auto h-px bg-gradient-to-r from-transparent via-[color:var(--border-color)] to-transparent my-12 opacity-50">
    </div>

    <!-- Active Version Content -->
    @if (selectedVersion() === 'v1') {
    <app-audio-model-v1 />
    } @else {
    <app-audio-model-v2 />
    }
  </div>

  <!-- Footer -->
  <app-footer-section></app-footer-section>
</div>
