<div class="bg-[color:var(--bg-card)] border border-[color:var(--border-color)] rounded-3xl p-6 md:p-8 shadow-sm">
  <div class="mb-8">
    <div class="flex items-center gap-3 mb-2">
      <div class="w-1.5 h-6 bg-[color:var(--brand-primary)] rounded-full"></div>
      <h2 class="text-xl md:text-2xl font-black text-[color:var(--text-primary)] tracking-tight">Emotion Distribution
      </h2>
    </div>
    <p class="text-sm text-[color:var(--text-muted)] font-medium pl-4.5">Final combined scores compared</p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
    <!-- Chart A -->
    <div class="flex flex-col">
      <h3 class="text-sm font-black uppercase text-[color:var(--text-secondary)] tracking-widest text-center mb-4">
        Analysis A</h3>
      <div class="w-full h-[320px] relative overflow-hidden min-w-0">
        <app-emotion-distribution [data]="distributionA()" viewType="bar"
          class="w-full h-full"></app-emotion-distribution>
      </div>
    </div>

    <!-- Chart B -->
    <div class="flex flex-col">
      <h3 class="text-sm font-black uppercase text-[color:var(--text-secondary)] tracking-widest text-center mb-4">
        Analysis B</h3>
      <div class="w-full h-[320px] relative overflow-hidden min-w-0">
        <app-emotion-distribution [data]="distributionB()" viewType="bar"
          class="w-full h-full"></app-emotion-distribution>
      </div>
    </div>
  </div>

  <!-- Differences Row -->
  <div class="pt-6 border-t border-[color:var(--border-color)]">
    <h3 class="text-xs font-black uppercase text-[color:var(--text-muted)] tracking-widest text-center mb-4">Percentage
      Difference (B - A)</h3>
    <div class="flex flex-wrap items-center justify-center gap-3 sm:gap-6">
      @for (diff of diffs(); track diff.emotion) {
      <div class="flex flex-col items-center flex-1 min-w-[60px]">
        <span class="text-[9px] font-black uppercase tracking-wider mb-2" [style.color]="diff.color">{{ diff.emotion
          }}</span>
        <span class="text-sm sm:text-base font-black px-2 py-1 rounded-lg border" [ngClass]="{
                  'text-emerald-500 bg-emerald-500/10 border-emerald-500/20': diff.status === 'improvement',
                  'text-red-500 bg-red-500/10 border-red-500/20': diff.status === 'worsening',
                  'text-[color:var(--text-muted)] bg-[color:var(--bg-secondary)] border-[color:var(--border-color)]': diff.status === 'neutral'
                }">
          {{ diff.formatted }}
        </span>
      </div>
      }
    </div>
  </div>
</div>
