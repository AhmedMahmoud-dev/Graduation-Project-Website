<div
  class="border-2 border-dashed border-[color:var(--border-color)] bg-[color:var(--bg-card)] rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center min-h-[220px] transition-all duration-300 relative group overflow-hidden"
  [class.border-solid]="!!analysis()"
  [class.hover:border-[color:var(--brand-primary)]]="!analysis() && !loading()"
  [class.cursor-pointer]="!analysis() && !loading()"
  (click)="onPanelClick()"
  [style.borderColor]="analysis() ? 'var(--border-color)' : ''">

  @if (loading()) {
  <div class="flex flex-col items-center gap-4">
    <div
      class="w-12 h-12 rounded-full border-[3px] border-[color:var(--brand-primary)] border-t-transparent animate-spin">
    </div>
    <span class="text-xs font-bold text-[color:var(--text-muted)] uppercase tracking-widest">Loading
      analysis...</span>
  </div>
  } @else if (!analysis()) {
  <div class="flex flex-col items-center">
    <div
      class="w-16 h-16 rounded-full bg-[color:var(--bg-secondary)] mb-4 flex items-center justify-center text-[color:var(--text-muted)] transition-all">
      <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
      </svg>
    </div>
    <span
      class="text-sm font-bold text-[color:var(--text-secondary)] uppercase tracking-wider group-hover:text-[color:var(--text-primary)] transition-colors">Select
      Analysis {{ panelLabel() }}</span>
  </div>
  } @else {
  <div
    class="absolute inset-0 bg-gradient-to-b from-transparent to-[color:var(--bg-secondary)]/50 pointer-events-none">
  </div>
  <div class="flex flex-col items-center text-center z-10 w-full">
    <span class="text-[10px] font-black uppercase text-[color:var(--text-muted)] tracking-widest mb-1">{{
      analysis()?.timestamp | date:'medium' }}</span>
    <p
      class="font-bold text-[color:var(--text-primary)] text-sm sm:text-base leading-snug mb-4 line-clamp-2 max-w-[80%]">
      {{ getExcerpt(analysis()) }}</p>

    <div class="flex items-center gap-3">
      <div class="px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest text-white"
        [style.backgroundColor]="format.getEmotionColor(getDominantLabel(analysis()))">
        {{ getDominantLabel(analysis()) }}
      </div>
      <span class="text-sm font-bold opacity-60" [style.color]="format.getEmotionColor(getDominantLabel(analysis()))">{{
        getConfidence(analysis()) | number:'1.1-1' }}%</span>
    </div>

    <button (click)="onChangeClick($event)"
      class="mt-6 text-xs font-bold text-[color:var(--brand-primary)] uppercase tracking-widest hover:underline cursor-pointer">Change
      Selection</button>
  </div>
  }
</div>
