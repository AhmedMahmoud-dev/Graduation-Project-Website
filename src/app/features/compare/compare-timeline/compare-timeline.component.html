<app-analysis-section-header 
  title="Emotion Timeline Comparison" 
  subtitle="Visualizations"
  description="Both emotional journeys overlaid on one chart">
</app-analysis-section-header>

<div class="rounded-2xl p-5 sm:p-8 w-full max-w-[calc(100vw-2.5rem)] sm:max-w-full mt-8"
  style="background: var(--bg-card); border: 1px solid var(--border-color)">

  <!-- Target Selector (Only for Image/Video) -->
  @if (targetOptions().length > 1) {
    <div class="flex justify-center mt-6">
      <div class="w-full lg:w-max px-4">
        <app-segmented-nav 
          [options]="targetOptions()" 
          [selectedValue]="compareTarget()"
          (selectedValueChange)="compareTarget.set($event)">
        </app-segmented-nav>
      </div>
    </div>
  }


  <div class="w-full relative mt-6">
    <app-emotion-timeline [data]="timelineDataA()" [secondaryData]="timelineDataB()" [dominant]="dominantA()"
      [secondaryDominant]="dominantB()" [compareMode]="true">
    </app-emotion-timeline>
  </div>

  <!-- this is the part -->
  <div class="flex flex-wrap items-center justify-center gap-8 mt-10 border-t border-[color:var(--border-color)] pt-8">
    <div class="flex flex-col items-center gap-3">
      <div class="h-1 w-24 rounded-full" [style.background]="format.getEmotionColor(dominantA())"></div>

      <div class="flex flex-col items-center">
        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-[color:var(--text-muted)] mb-1">Analysis
          A</span>
        <span class="text-xs font-bold text-[color:var(--text-primary)]">{{ dominantA() | titlecase }} Journey</span>
      </div>
    </div>

    <div class="flex flex-col items-center gap-3">
      <div class="h-1 w-24 rounded-full" [style.background]="format.getEmotionColor(dominantB()) + '44'" 
           [style.border-top]="'2.5px dashed ' + format.getEmotionColor(dominantB())"

           style="background: transparent; height: 0; border-radius: 0;"></div>
      <div class="flex flex-col items-center">
        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-[color:var(--text-muted)] mb-1">Analysis
          B</span>
        <span class="text-xs font-bold text-[color:var(--text-primary)]">{{ dominantB() | titlecase }} Journey</span>
      </div>
    </div>
  </div>
</div>
