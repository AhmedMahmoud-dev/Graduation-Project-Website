<div class="auth-card">
  <!-- Header -->
  <div class="flex flex-col items-center mb-8">
    <div class="flex items-center gap-2 mb-6">
      <svg class="w-8 h-8 text-[color:var(--brand-primary)]" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 3v2M15 3v2M3 9h2M19 9h2M12 19c-3.866 0-7-3.134-7-7s3.134-7 7-7 7 3.134 7 7-7 3.134-7 7z" />
        <path d="M9 12c.5-1 1.5-1.5 3-1.5s2.5.5 3 1.5M12 6q0 3 -2 5" />
      </svg>
      <span class="font-heading font-extrabold text-2xl tracking-tight text-[color:var(--text-primary)]">Emotra</span>
    </div>

    <div class="w-full h-px bg-[color:var(--border-color)] mb-6"></div>

    <h1 class="text-2xl font-bold mb-2 font-heading tracking-tight text-[color:var(--text-primary)] text-center">Welcome
    back</h1>
    <p class="text-[color:var(--text-secondary)] text-[15px] font-medium text-center">Sign in to continue to Emotra</p>
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-[24px]">


    <div>
      <label class="auth-label">Email address</label>
      <input type="email" formControlName="email" class="auth-input" placeholder="you@example.com" [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
      @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
        <app-form-field-error [errorText]="'Valid email is required.'"></app-form-field-error>
      }
    </div>

    <div>
      <div class="flex justify-between items-center mb-[8px]">
        <label class="auth-label mb-0">Password</label>
      </div>
      <app-password-input formControlName="password" [hasError]="!!(loginForm.get('password')?.invalid && loginForm.get('password')?.touched)" placeholder="••••••••"></app-password-input>
      @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
        <app-form-field-error [errorText]="'Password is required.'"></app-form-field-error>
      }
    </div>

      <div class="flex justify-end mt-[-8px]">
        <a routerLink="/auth/forgot-password"
        class="text-[13px] font-medium text-[color:var(--brand-primary)] hover:underline">Forgot password?</a>
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading" class="auth-button">
        @if (!isLoading) {
          <span>Sign In</span>
        }
        @if (isLoading) {
          <svg class="animate-spin h-5 w-5 text-current" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
        }
      </button>
    </form>

    <!-- Divider -->
    <div class="flex items-center my-[24px]">
      <div class="flex-1 h-px bg-[color:var(--border-color)]"></div>
      <span class="divider-text">or</span>
      <div class="flex-1 h-px bg-[color:var(--border-color)]"></div>
    </div>

    <!-- Google Button -->
    <div class="relative group">
      <button type="button" class="google-btn pointer-events-none opacity-60">
        <svg class="w-[20px] h-[20px]" viewBox="0 0 24 24">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853" />
              <path
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                fill="#FBBC05" />
                <path
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  fill="#EA4335" />
                </svg>
                <span>Continue with Google</span>
              </button>

              <!-- Coming Soon Badge -->
              <div
                class="absolute -top-[10px] -right-[10px] bg-[color:var(--brand-primary)] text-white text-[10px] font-bold px-2 py-0.5 rounded-full z-10 shadow-md">
                Coming Soon
              </div>

              <!-- Tooltip -->
              <app-tooltip text="Google sign-in coming soon" position="top" [visible]="true"></app-tooltip>
            </div>

            <!-- Bottom link -->
            <div class="mt-[32px] text-center text-[14px]">
              <span class="text-[color:var(--text-secondary)]">Don't have an account? </span>
              <a routerLink="/auth/register"
                class="text-[color:var(--brand-primary)] font-medium hover:underline decoration-2 underline-offset-4">Create
              one</a>
            </div>

          </div>
