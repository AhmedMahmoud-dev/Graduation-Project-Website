<div class="auth-card">
  <!-- Header -->
  <div class="flex flex-col items-center mb-8">
    <div class="flex items-center gap-2 mb-6">
      <svg class="w-8 h-8 text-[color:var(--brand-primary)]" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
        </path>
      </svg>
      <span class="font-heading font-extrabold text-2xl tracking-tight text-[color:var(--text-primary)]">Emotra</span>
    </div>

    <div class="w-full h-px bg-[color:var(--border-color)] mb-6"></div>

    <h1 class="text-2xl font-bold mb-2 font-heading tracking-tight text-[color:var(--text-primary)] text-center">Forgot
    Password</h1>
    <p class="text-[color:var(--text-secondary)] text-[15px] font-medium text-center px-4">Enter your email and we'll
    send you a reset code</p>
  </div>



  <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-[24px]">


    <div>
      <label class="auth-label">Email address</label>
      <input type="email" formControlName="email" class="auth-input" placeholder="you@example.com" [class.error]="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched">
      @if (forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched) {
        <app-form-field-error [errorText]="'Valid email is required.'"></app-form-field-error>
      }
    </div>

    <button type="submit" [disabled]="forgotForm.invalid || isLoading" class="auth-button mt-2">
      @if (!isLoading) {
        <span>Send Reset Code</span>
      }
      @if (isLoading) {
        <svg class="animate-spin h-5 w-5 text-current" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
          </path>
        </svg>
      }
    </button>
  </form>

  <!-- Bottom link -->
  <div class="mt-[32px] text-center text-[14px]">
    <span class="text-[color:var(--text-secondary)]">Remember your password? </span>
    <a routerLink="/auth/login"
    class="text-[color:var(--brand-primary)] font-medium hover:underline decoration-2 underline-offset-4">Sign in</a>
  </div>

</div>
