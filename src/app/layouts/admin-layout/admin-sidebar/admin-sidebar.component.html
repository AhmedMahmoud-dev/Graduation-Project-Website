<aside
  class="fixed top-0 left-0 h-full w-64 bg-[color:var(--bg-surface)] border-r border-[color:var(--border-color)] flex flex-col transition-transform duration-300 ease-in-out lg:translate-x-0"
  [class.-translate-x-full]="!isOpen" [class.translate-x-0]="isOpen">

  <!-- Logo Header -->
  <div class="h-16 flex items-center px-6 border-b border-[color:var(--border-color)] shrink-0">
    <a routerLink="/admin/dashboard" class="flex items-center gap-2 group">
      <div
        class="w-8 h-8 rounded-xl bg-gradient-to-tr from-[color:var(--brand-primary)] to-[color:var(--accent)] flex items-center justify-center text-white shadow-md group-hover:shadow-[var(--shadow)] transition-all">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
          </path>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
        </svg>
      </div>
      <span
        class="font-black text-lg tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-[color:var(--text-primary)] to-[color:var(--text-secondary)]">
        Admin Area
      </span>
    </a>
  </div>

  <!-- Navigation Links -->
  <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1 scrollbar-hide">
    @for (item of menuItems; track item.route) {
    <a [routerLink]="item.route"
      routerLinkActive="bg-[color:var(--brand-primary)]/10 text-[color:var(--brand-primary)] font-bold shadow-sm border border-[color:var(--brand-primary)]/20"
      [routerLinkActiveOptions]="{exact: false}" (click)="onMenuClick()"
      class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-[color:var(--text-secondary)] hover:bg-[color:var(--bg-secondary)] hover:text-[color:var(--text-primary)] transition-all">
      <svg class="w-5 h-5 shrink-0 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon"></path>
      </svg>
      {{ item.label }}
    </a>
    }
  </nav>

  <!-- Return to App Link -->
  <div class="p-4 border-t border-[color:var(--border-color)]">
    <a routerLink="/dashboard"
      class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold text-[color:var(--text-muted)] hover:text-[color:var(--text-primary)] hover:bg-[color:var(--bg-secondary)] transition-all">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
      </svg>
      Back to App
    </a>
  </div>
</aside>
