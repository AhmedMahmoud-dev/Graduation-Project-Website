<div class="flex h-screen overflow-hidden bg-[color:var(--bg-primary)] text-[color:var(--text-primary)] transition-colors duration-300">
  
  <!-- Sidebar -->
  <app-admin-sidebar 
    [isOpen]="sidebarOpen()" 
    (closeMenu)="closeSidebar()"
    class="z-[70]">
  </app-admin-sidebar>

  <!-- Mobile Overlay -->
  @if (sidebarOpen()) {
    <div 
      class="fixed inset-0 bg-black/50 z-[60] lg:hidden backdrop-blur-sm animate-in fade-in"
      (click)="closeSidebar()">
    </div>
  }

  <!-- Main Content Wrapper -->
  <div class="flex-1 flex flex-col min-w-0 transition-all duration-300 lg:pl-64">
    
    <!-- Topbar -->
    <app-admin-topbar (toggleSidebar)="toggleSidebar()"></app-admin-topbar>
    
    <!-- Main Content Area -->
    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-[color:var(--bg-primary)] p-4 sm:p-6 lg:p-8">
      <router-outlet></router-outlet>
    </main>

  </div>
</div>
