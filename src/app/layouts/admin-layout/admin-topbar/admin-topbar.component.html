<header class="h-16 bg-[color:var(--bg-surface)] border-b border-[color:var(--border-color)] flex items-center justify-between px-4 sm:px-6 sticky top-0 z-[50]">
  
  <div class="flex items-center gap-4">
    <!-- Mobile Sidebar Toggle -->
    <button (click)="toggleSidebar.emit()" class="lg:hidden p-2 -ml-2 rounded-lg text-[color:var(--text-muted)] hover:text-[color:var(--brand-primary)] hover:bg-[color:var(--brand-primary)]/10 transition-colors focus:outline-none">
      <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>

    <!-- Dynamic Page Title -->
    <h1 class="text-xl font-bold text-[color:var(--text-primary)] tracking-tight hidden sm:block">
      {{ pageTitle() }}
    </h1>
  </div>

  <div class="flex items-center gap-4 sm:gap-6">
    <!-- Theme Toggle -->
    <div class="items-center bg-[color:var(--bg-secondary)] p-1 rounded-full border border-[color:var(--border-color)] shadow-sm hidden md:flex">
      <button (click)="setTheme('light')" class="p-1.5 rounded-full transition-colors group relative" [class.bg-[color:var(--bg-surface)]]="currentTheme() === 'light'" [class.text-[color:var(--brand-primary)]]="currentTheme() === 'light'" [class.text-[color:var(--text-muted)]]="currentTheme() !== 'light'">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
        </svg>
      </button>
      <button (click)="setTheme('dark')" class="p-1.5 rounded-full transition-colors group relative" [class.bg-[color:var(--bg-surface)]]="currentTheme() === 'dark'" [class.text-[color:var(--brand-primary)]]="currentTheme() === 'dark'" [class.text-[color:var(--text-muted)]]="currentTheme() !== 'dark'">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
        </svg>
      </button>
    </div>

    <!-- User Profile Dropdown -->
    <div class="relative">
      <button (click)="toggleUserMenu()" class="flex items-center gap-2 focus:outline-none group">
        <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-[color:var(--brand-primary)] to-[color:var(--accent)] text-white flex items-center justify-center text-sm font-bold shadow-sm group-hover:shadow-[var(--shadow)] transition-all select-none">
          {{ getUserInitials() }}
        </div>
        <svg class="w-4 h-4 text-[color:var(--text-muted)] group-hover:text-[color:var(--brand-primary)] transition-colors hidden sm:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path>
        </svg>
      </button>

      @if (userMenuOpen()) {
        <div class="absolute right-0 top-full mt-2 w-56 bg-[color:var(--bg-card)] border border-[color:var(--border-color)] rounded-2xl shadow-xl py-2 z-[60] animate-in fade-in slide-in-from-top-2">
          <div class="px-4 py-2 border-b border-[color:var(--border-color)] mb-1">
            <span class="block text-sm font-bold text-[color:var(--text-primary)] truncate">{{ currentUser()?.full_name }}</span>
            <span class="block text-xs font-semibold text-[color:var(--text-muted)] mt-0.5 truncate uppercase tracking-wider">Administrator</span>
          </div>
          
          <div class="p-1.5">
            <button (click)="logout()" class="w-full flex items-center gap-3 px-3 py-2 text-sm text-red-500 hover:bg-red-500/10 rounded-xl transition-colors font-bold text-left">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
              </svg>
              Logout
            </button>
          </div>
        </div>
      }
    </div>
  </div>
</header>

@if (userMenuOpen()) {
  <div (click)="toggleUserMenu()" class="fixed inset-0 z-[55] bg-transparent"></div>
}
