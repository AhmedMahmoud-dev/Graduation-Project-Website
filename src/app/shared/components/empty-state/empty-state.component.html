<section class="flex flex-col items-center justify-center text-center w-full" 
         [class.flex-1]="isFullPage" 
         [class.py-32]="isFullPage" 
         [class.py-16]="!isFullPage"
         [style.minHeight]="minHeight">
  
  <!-- Icon Wrapper -->
  <div class="w-24 h-24 md:w-32 md:h-32 rounded-[2rem] md:rounded-[2.5rem] bg-[color:var(--bg-card)] border border-[color:var(--border-color)] flex items-center justify-center text-[color:var(--text-muted)] mb-8 md:mb-10 shadow-inner-lg">
    <div class="w-10 h-10 md:w-12 md:h-12 opacity-20 flex items-center justify-center">
      <ng-content select="[empty-icon]"></ng-content>
    </div>
  </div>

  <!-- Main Message -->
  <h3 class="text-2xl md:text-4xl font-black mb-4 tracking-tight" style="color: var(--text-primary)">
    <ng-content select="[empty-msg]"></ng-content>
  </h3>

  <!-- Hint Text -->
  <p class="text-[color:var(--text-secondary)] text-base md:text-xl max-w-md mb-8 md:mb-12 leading-relaxed font-medium px-6">
    <ng-content select="[empty-hint]"></ng-content>
  </p>

  <!-- Actions -->
  <div class="flex flex-col sm:flex-row items-center justify-center gap-4 w-full max-w-md mx-auto px-6">
    <ng-content select="[empty-actions]"></ng-content>
  </div>

</section>
