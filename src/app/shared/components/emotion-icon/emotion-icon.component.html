<svg [attr.width]="sizePx()" [attr.height]="sizePx()" viewBox="0 0 24 24" fill="none" stroke="currentColor"
  stroke-width="2" stroke-linecap="round" stroke-linejoin="round" [class]="className" [style.color]="resolvedColor()">
  <ng-container>
    @switch (emotionLabel().toLowerCase()) {
      <!-- JOY: Radiant smiley -->
      @case ('joy') {
        <g>
          <circle cx="12" cy="12" r="10" />
          <path d="M8 14s1.5 2 4 2 4-2 4-2" />
          <line x1="9" y1="9" x2="9.01" y2="9" />
          <line x1="15" y1="9" x2="15.01" y2="9" />
        </g>
      }
      <!-- SADNESS: Tear/Downward curve -->
      @case ('sadness') {
        <g>
          <circle cx="12" cy="12" r="10" />
          <path d="M16 16s-1.5-2-4-2-4 2-4 2" />
          <line x1="9" y1="9" x2="9.01" y2="9" />
          <line x1="15" y1="9" x2="15.01" y2="9" />
        </g>
      }
      <!-- ANGER: Sharp brows/Angry eyes -->
      @case ('anger') {
        <g>
          <circle cx="12" cy="12" r="10" />
          <path d="M16 16s-1.5-2-4-2-4 2-4 2" />
          <path d="M7.5 8l3 1M16.5 8l-3 1" />
        </g>
      }
      <!-- FEAR: Wide eyes, raised brows -->
      @case ('fear') {
        <g>
          <circle cx="12" cy="12" r="10" />
          <circle cx="8.5" cy="10" r="1.5" />
          <circle cx="15.5" cy="10" r="1.5" />
          <path d="M8 15h8" />
          <path d="M7 7.5a2.5 2.5 0 0 1 3 0M14 7.5a2.5 2.5 0 0 1 3 0" />
        </g>
      }
      <!-- SURPRISE: Round mouth, raised brows -->
      @case ('surprise') {
        <g>
          <circle cx="12" cy="12" r="10" />
          <circle cx="12" cy="15.5" r="2.5" />
          <line x1="9" y1="9" x2="9.01" y2="9" />
          <line x1="15" y1="9" x2="15.01" y2="9" />
          <path d="M8 6.5a2.5 2.5 0 0 1 3 0M13 6.5a2.5 2.5 0 0 1 3 0" />
        </g>
      }
      <!-- DISGUST: Wavy mouth -->
      @case ('disgust') {
        <g>
          <circle cx="12" cy="12" r="10" />
          <path d="M8 15c.5-1 1-1 1.5 0s1 1 1.5 0s1-1 1.5 0s1 1 1.5 0" />
          <path d="M10 9l-2 1M14 9l2 1" />
        </g>
      }
      <!-- NEUTRAL: Flat line -->
      @case ('neutral') {
        <g>
          <circle cx="12" cy="12" r="10" />
          <line x1="8" y1="15" x2="16" y2="15" />
          <line x1="9" y1="9" x2="9.01" y2="9" />
          <line x1="15" y1="9" x2="15.01" y2="9" />
        </g>
      }
      <!-- POSITIVE (Polarity): Sparkles -->
      @case ('positive') {
        <g>
          <path d="M12 3l1 4 4 1-4 1-1 4-1-4-4-1 4-1 1-4z" />
          <circle cx="19" cy="13" r="1" />
          <circle cx="5" cy="17" r="1" />
        </g>
      }
      <!-- NEGATIVE (Polarity): Crescent Moon -->
      @case ('negative') {
        <g>
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
        </g>
      }
      <!-- BRAIN (Loading): Brain outline -->
      @case ('brain') {
        <g>
          <path d="M12 2a7 7 0 0 1 0 14V2z" />
          <path d="M12 22a7 7 0 0 1 0-14v14z" />
          <path d="M12 8c2 0 3.5 1.5 3.5 3.5v1a1.5 1.5 0 0 1-1.5 1.5H10a1.5 1.5 0 0 1-1.5-1.5v-1C8.5 9.5 10 8 12 8z"
            opacity="0.4" />
          </g>
        }
        <!-- DEFAULT: Generic info or confused circle -->
        @default {
          <g>
            <circle cx="12" cy="12" r="10" />
            <path d="M12 16v-4" />
            <path d="M12 8h.01" />
          </g>
        }
      }
    </ng-container>
  </svg>
