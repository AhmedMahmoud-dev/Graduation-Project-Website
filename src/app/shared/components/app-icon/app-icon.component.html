<svg [attr.width]="sizePx()" [attr.height]="sizePx()" viewBox="0 0 24 24" fill="none" stroke="currentColor"
  [attr.stroke-width]="strokeWidth" stroke-linecap="round" stroke-linejoin="round" [class]="className">
  <ng-container>
    @switch (iconName().toLowerCase()) {
      <!-- TEXT / DOCUMENT -->
      @case ('text') {
        <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      }

      <!-- AUDIO / MICROPHONE -->
      @case ('audio') {
        <path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
      }

      <!-- GLOBE / PLATFORM -->
      @case ('globe') {
        <path d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 003 12c0-1.605.42-3.113 1.157-4.418" />
      }

      <!-- STATS: LOGS (Same as document but often used for total counts) -->
      @case ('stats-logs') {
        <path d="M9 12h10m-10 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
      }

      <!-- STATS: CONFIDENCE / SHIELD-CHECK -->
      @case ('stats-confidence') {
        <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      }

      <!-- STATS: COMPUTE / SERVER-DATABASE -->
      @case ('stats-compute') {
        <path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
      }

      <!-- CLOCK / TIME -->
      @case ('clock') {
        <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
      }

      <!-- REFRESH -->
      @case ('refresh') {
        <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
      }

      <!-- TRASH / DELETE -->
      @case ('trash') {
        <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
      }

      <!-- SEARCH -->
      @case ('search') {
        <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      }

      <!-- CHEVRON DOWN -->
      @case ('chevron-down') {
        <path d="M19 9l-7 7-7-7" />
      }

      <!-- DEFAULT: Question Circle -->
      @default {
        <circle cx="12" cy="12" r="10" />
        <path d="M12 16v-4" />
        <path d="M12 8h.01" />
      }
    }
  </ng-container>
</svg>
