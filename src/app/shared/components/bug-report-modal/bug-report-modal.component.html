<!-- Backdrop -->
<div class="bug-report-backdrop" (click)="close()"></div>

<!-- Modal -->
<div class="bug-report-modal" role="dialog" aria-labelledby="bug-report-title" aria-modal="true">

  <!-- Header -->
  <div class="bug-report-header">
    <div class="bug-report-header-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path
          d="M8 2l1.88 1.88M14.12 3.88L16 2M9 7.13v-1a3.003 3.003 0 116 0v1M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 014-4h4a4 4 0 014 4v3c0 3.3-2.7 6-6 6zM12 20v2M6 13H2M22 13h-4M6.34 7.34L4.93 5.93M17.66 7.34l1.41-1.41" />
      </svg>
    </div>
    <div class="bug-report-header-text">
      <h2 id="bug-report-title" class="bug-report-heading">Report a Bug</h2>
      <p class="bug-report-subheading">Help us squash issues — describe what went wrong</p>
    </div>
    <button id="bug-report-close" class="bug-report-close" (click)="close()" type="button" aria-label="Close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <!-- Body -->
  <form class="bug-report-body" (ngSubmit)="submit()">

    <!-- Title -->
    <div class="bug-report-field">
      <label for="bug-title" class="bug-report-label">Title <span class="text-red-400">*</span></label>
      <input id="bug-title" type="text" class="bug-report-input" placeholder="e.g. Sidebar overlap on mobile"
        [ngModel]="title()" (ngModelChange)="title.set($event)" name="title" maxlength="120" autocomplete="off" />
      <span class="bug-report-hint">{{ title().length }}/120</span>
    </div>

    <!-- Category & Priority Row -->
    <div class="bug-report-row">
      <div class="bug-report-field bug-report-field-half">
        <label for="bug-category" class="bug-report-label">Category</label>
        <app-dropdown-menu id="bug-category" [options]="categoryOptions" [selectedValue]="category()"
          (selectedValueChange)="category.set($event)">
        </app-dropdown-menu>
      </div>
      <div class="bug-report-field bug-report-field-half">
        <label for="bug-priority" class="bug-report-label">Priority</label>
        <app-dropdown-menu id="bug-priority" [options]="priorityOptions" [selectedValue]="priority()"
          (selectedValueChange)="priority.set($event)">
        </app-dropdown-menu>
      </div>
    </div>

    <!-- Description -->
    <div class="bug-report-field">
      <label for="bug-description" class="bug-report-label">Description <span class="text-red-400">*</span></label>
      <textarea id="bug-description" class="bug-report-textarea"
        placeholder="Steps to reproduce, expected vs actual behavior…" [ngModel]="description()"
        (ngModelChange)="description.set($event)" name="description" rows="4" maxlength="2000"></textarea>
      <span class="bug-report-hint">{{ description().length }}/2000 · Min 10 characters</span>
    </div>

    <!-- Metadata info -->
    <div class="bug-report-meta-info">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="16" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12.01" y2="8"></line>
      </svg>
      <span>Viewport size and page URL will be auto-attached to help us investigate.</span>
    </div>

    <!-- Actions -->
    <div class="bug-report-actions">
      <button type="button" class="bug-report-btn-cancel" (click)="close()">Cancel</button>
      <button id="bug-report-submit" type="submit" class="bug-report-btn-submit"
        [disabled]="!isValid || submitting()">
        @if (submitting()) {
        <svg class="bug-report-spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5">
          <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"></path>
        </svg>
        <span>Submitting…</span>
        } @else {
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
        <span>Submit Report</span>
        }
      </button>
    </div>
  </form>
</div>
