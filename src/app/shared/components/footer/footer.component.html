<footer
  class="bg-[color:var(--bg-surface)] border-t border-[color:var(--border-color)] py-10 sm:py-12 px-4 sm:px-6 lg:px-12 overflow-hidden w-full">
  <div class="max-w-7xl mx-auto flex flex-col gap-10 sm:gap-12 w-full">

    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 w-full">
      <!-- Left Logo & Tagline -->
      <div class="w-full sm:w-auto">
        <div class="flex items-center gap-3 mb-4">
          <svg class="w-8 h-8 text-[color:var(--brand-primary)] shrink-0" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 3v2M15 3v2M3 9h2M19 9h2M12 19c-3.866 0-7-3.134-7-7s3.134-7 7-7 7 3.134 7 7-7 3.134-7 7z" />
            <path d="M9 12c.5-1 1.5-1.5 3-1.5s2.5.5 3 1.5M12 6q0 3 -2 5" />
          </svg>
          <span class="font-heading font-bold text-2xl tracking-tight break-words">Emotra</span>
        </div>
        <p class="text-[color:var(--text-secondary)] text-sm sm:text-base break-words">Understand your emotions over
          time.</p>
      </div>

      <!-- Right Links -->
      <ul
        class="flex flex-col sm:flex-row flex-wrap gap-x-8 gap-y-4 font-semibold text-[color:var(--text-secondary)] w-full sm:w-auto">
        <li><a (click)="scrollTo('#features', $event)"
            class="hover:text-[color:var(--brand-primary)] transition-colors cursor-pointer inline-block w-full sm:w-auto">Features</a>
        </li>
        <li><a (click)="scrollTo('#how-it-works', $event)"
            class="hover:text-[color:var(--brand-primary)] transition-colors cursor-pointer inline-block w-full sm:w-auto">How
            It
            Works</a></li>
        <li><a (click)="scrollTo('#pricing', $event)"
            class="hover:text-[color:var(--brand-primary)] transition-colors cursor-pointer inline-block w-full sm:w-auto">Pricing</a>
        </li>
        @if (!currentUser()) {
        <li><a (click)="navigateTo('/auth/login')"
            class="hover:text-[color:var(--brand-primary)] transition-colors cursor-pointer capitalize inline-block w-full sm:w-auto">Login</a>
        </li>
        <li><a (click)="navigateTo('/auth/register')"
            class="hover:text-[color:var(--brand-primary)] transition-colors cursor-pointer capitalize inline-block w-full sm:w-auto">Register</a>
        </li>
        } @else if (hasFeedback() && !isAdmin()) {
        <li><a (click)="openFeedback()"
            class="text-[color:var(--text-muted)] hover:text-[color:var(--brand-primary)] transition-colors cursor-pointer w-full sm:w-auto flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M11.48 3.499a.562.562 0 011.04 0l2.125 5.111a.563.563 0 00.475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 00-.182.557l1.285 5.385a.562.562 0 01-.84.61l-4.725-2.885a.563.563 0 00-.586 0L6.982 20.54a.562.562 0 01-.84-.61l1.285-5.386a.562.562 0 00-.182-.557l-4.204-3.602a.563.563 0 01.321-.988l5.518-.442a.563.563 0 00.475-.345L11.48 3.5z" />
            </svg>
            Your Review
          </a>
        </li>
        }
      </ul>
    </div>

    <div class="w-full h-px bg-[color:var(--border-color)]"></div>

    <div class="flex flex-col flex-wrap md:flex-row justify-between items-start md:items-center gap-6 w-full">
      <p class="text-[color:var(--text-muted)] text-sm break-words w-full sm:w-auto">&copy; 2026 Emotra. All rights
        reserved.</p>

      <!-- Theme Toggle Segmented Control -->
      <div
        class="flex flex-row flex-wrap items-center bg-[color:var(--bg-primary)] p-1 rounded-2xl sm:rounded-full border border-[color:var(--border-color)] shadow-sm w-full sm:w-auto justify-center sm:justify-start">

        <button (click)="setTheme('light')"
          class="px-3 py-2 sm:py-1.5 rounded-full text-xs font-semibold flex items-center justify-center gap-2 transition-all duration-200 flex-1 sm:flex-none"
          [class.bg-[color:var(--bg-surface)]]="currentTheme() === 'light'"
          [class.text-[color:var(--text-primary)]]="currentTheme() === 'light'"
          [class.shadow-sm]="currentTheme() === 'light'"
          [class.text-[color:var(--text-muted)]]="currentTheme() !== 'light'">
          <svg class="w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
            </path>
          </svg>
          Light
        </button>

        <button (click)="setTheme('system')"
          class="px-3 py-2 sm:py-1.5 rounded-full text-xs font-semibold flex items-center justify-center gap-2 transition-all duration-200 flex-1 sm:flex-none"
          [class.bg-[color:var(--bg-surface)]]="currentTheme() === 'system'"
          [class.text-[color:var(--text-primary)]]="currentTheme() === 'system'"
          [class.shadow-sm]="currentTheme() === 'system'"
          [class.text-[color:var(--text-muted)]]="currentTheme() !== 'system'">
          <svg class="w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
            </path>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
          </svg>
          Auto
        </button>

        <button (click)="setTheme('dark')"
          class="px-3 py-2 sm:py-1.5 rounded-full text-xs font-semibold flex items-center justify-center gap-2 transition-all duration-200 flex-1 sm:flex-none"
          [class.bg-[color:var(--bg-surface)]]="currentTheme() === 'dark'"
          [class.text-[color:var(--text-primary)]]="currentTheme() === 'dark'"
          [class.shadow-sm]="currentTheme() === 'dark'"
          [class.text-[color:var(--text-muted)]]="currentTheme() !== 'dark'">
          <svg class="w-3.5 h-3.5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
          </svg>
          Dark
        </button>

      </div>
    </div>

  </div>
</footer>
