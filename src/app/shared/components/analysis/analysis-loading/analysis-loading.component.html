<section class="flex-1 flex flex-col items-center justify-center px-6 py-24" style="background: var(--bg-primary)">
  <!-- Optional Brain Icon -->
  @if (showBrainIcon()) {
    <div class="mb-8 brain-pulse">
      <app-emotion-icon [emotion]="'brain'" [size]="80"></app-emotion-icon>
    </div>
  }

  <div class="text-center w-full max-w-sm">
    <h3 class="text-xl font-bold mb-3 h-8" style="color: var(--text-primary)">{{ stepText() }}</h3>

    <!-- Progress Bar -->
    <div class="w-full h-1.5 rounded-full overflow-hidden mb-3" style="background: var(--border-color)">
      <div class="h-full rounded-full transition-all duration-500"
        style="background: var(--brand-primary)"
      [style.width.%]="progress()"></div>
    </div>

    <p class="text-xs font-medium tracking-widest uppercase" style="color: var(--text-muted)">
      Analyzing emotions...
    </p>
  </div>
</section>
