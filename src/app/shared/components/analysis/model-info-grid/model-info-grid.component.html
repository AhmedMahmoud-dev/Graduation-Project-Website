@if (showTitle()) {
  <app-analysis-section-header 
    [title]="title()" 
    [subtitle]="subTitle()" 
    variant="border"
    marginBottom="mb-8">
  </app-analysis-section-header>

}

<div class="flex flex-wrap gap-3">
  @for (chip of chips(); track chip.label) {
    <div class="info-chip">
      <span class="text-xs" style="color: var(--text-muted)">{{ chip.label }}</span>
      <span class="text-sm font-bold" style="color: var(--text-primary)" [class.font-mono]="chip.mono">
        {{ chip.value }}
      </span>
    </div>
  }
  @if (warningChip(); as wChip) {
    <div class="info-chip truncated-chip">
      <span class="text-xs" style="color: #fd9644">⚠ {{ wChip.label }}</span>
      <span class="text-sm font-bold" style="color: #fd9644">{{ wChip.value }}</span>
    </div>
  }
</div>
