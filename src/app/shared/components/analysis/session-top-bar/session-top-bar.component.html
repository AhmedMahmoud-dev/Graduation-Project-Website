<section class="pt-28 pb-8 px-6 md:px-12"
  style="background: var(--bg-primary); border-bottom: 1px solid var(--border-color)">
  <div class="max-w-7xl mx-auto w-full min-w-0 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
    <div class="flex items-center gap-3">
      <span class="px-3 py-1.5 rounded-lg text-xs font-mono font-bold"
        style="background: var(--bg-surface, var(--bg-card)); color: var(--text-secondary); border: 1px solid var(--border-color)">
        Session #{{ sessionId().slice(0, 8) }}
      </span>
      <button (click)="copySessionId()" class="p-1.5 rounded-lg transition-colors" style="color: var(--text-muted)"
        title="Copy Session ID">
        @if (!copiedId()) {
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
          </svg>
        }
        @if (copiedId()) {
          <svg class="w-4 h-4" style="color: var(--accent)" fill="none" stroke="currentColor"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
        }
      </button>
    </div>
    <button (click)="newAnalysis.emit()" class="shrink-0 px-6 py-2.5 rounded-full font-bold text-sm transition-all"
      style="border: 1px solid var(--border-color); color: var(--text-primary)">
      ← New Analysis
    </button>
  </div>
</section>
