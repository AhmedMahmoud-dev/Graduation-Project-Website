@if (totalPages() > 1) {
<div class="pagination">
  <button (click)="goToPage(currentPage() - 1)" [disabled]="currentPage() === 1" class="pagination__btn" aria-label="Previous Page">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
    </svg>
  </button>
  @for (page of getPageNumbers(); track page) {
  <button (click)="goToPage(page)" class="pagination__btn" [class.pagination__btn--active]="page === currentPage()">
    {{ page }}
  </button>
  }
  <button (click)="goToPage(currentPage() + 1)" [disabled]="currentPage() === totalPages()" class="pagination__btn" aria-label="Next Page">
    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
    </svg>
  </button>
</div>
}
