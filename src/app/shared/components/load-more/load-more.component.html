<div class="pt-8 flex justify-center">
  <button (click)="onLoadMore()" [disabled]="isLoadingMore()"
    class="group relative flex items-center gap-3 px-8 py-4 rounded-2xl bg-[color:var(--bg-card)] border border-[color:var(--border-color)] hover:border-[color:var(--brand-primary)] transition-all shadow-lg disabled:opacity-50 disabled:cursor-not-allowed">
    <span class="text-xs font-black uppercase tracking-widest text-[color:var(--text-primary)]">
      @if (isLoadingMore()) {
      Loading...
      } @else if (searchQuery().trim()) {
      Search Older {{ label() }}
      } @else {
      Load <span class="text-[color:var(--brand-primary)]">{{ remainingCount() }}</span> More {{ label() }}
      }
    </span>
    @if (!isLoadingMore()) {
    <app-icon name="chevron-down" className="w-4 h-4 text-[color:var(--brand-primary)]"
      [strokeWidth]="3"></app-icon>
    }
  </button>
</div>
