<section
  class="relative pt-20 md:pt-28 lg:pt-32 px-5 md:px-12 border-b border-[color:var(--border-color)] overflow-hidden"
  [class.pb-10]="!hasNav()" [class.md:pb-14]="!hasNav()" [class.lg:pb-16]="!hasNav()" [class.pb-0]="hasNav()"
  style="background: var(--bg-card)">

  <div class="max-w-7xl mx-auto">
    <div class="flex flex-col xl:flex-row xl:items-end justify-between" [class.mb-10]="hasNav()"
      [class.md:mb-14]="hasNav()" [class.xl:mb-16]="hasNav()">

      <!-- Title Section -->
      <div class="flex-1 min-w-0">
        @if (subtitle()) {
        <p
          class="text-[9px] sm:text-[10px] md:text-xs font-black uppercase tracking-[0.3em] md:tracking-[0.4em] mb-4 md:mb-5 opacity-40 text-[color:var(--text-muted)]">
          {{ subtitle() }}
        </p>
        }

        <h1
          class="text-2xl sm:text-3xl md:text-4xl lg:text-5xl xl:text-6xl font-black font-heading tracking-tight text-[color:var(--text-primary)] break-words leading-[1.05] md:leading-[1.1]">
          {{ title() }}
        </h1>

        @if (description()) {
        <p
          class="text-base sm:text-lg md:text-xl text-[color:var(--text-secondary)] mt-5 md:mt-7 leading-relaxed font-medium">
          {{ description() }}
        </p>
        }
      </div>

      <!-- Actions Section -->
      <div class="actions-container shrink-0 w-fit xl:w-auto xl:ml-12 mt-8 xl:mt-0">
        <ng-content select="[actions]"></ng-content>
      </div>
    </div>

    <!-- Navigation Bar Slot -->
    @if (hasNav()) {
    <div class="w-full">
      <ng-content select="[nav]"></ng-content>
    </div>
    }
  </div>
</section>
