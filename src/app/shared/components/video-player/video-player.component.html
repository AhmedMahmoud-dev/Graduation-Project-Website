<div class="video-player-wrapper" #playerContainer (mousemove)="showControlsWithTimeout()" (mouseleave)="hideControls()">
  <!-- Video Element -->
  <video #videoElement 
         [src]="src" 
         (click)="togglePlay()"
         (ended)="onEnded()"
         class="main-video-el"
         [style.max-height]="isFullscreen ? '100%' : maxHeight"></video>

  <!-- Big Central Play button (fade in on pause/hover) -->
  <button class="big-play-btn" *ngIf="!isPlaying" (click)="togglePlay()">
    <svg class="w-10 h-10 fill-white" viewBox="0 0 24 24">
      <path d="M8 5v14l11-7z" />
    </svg>
  </button>

  <!-- Controls overlay -->
  <div class="controls-overlay" [class.visible]="controlsVisible || !isPlaying">
    
    <!-- Progress bar -->
    <div class="progress-bar-container">
      <input type="range" 
             #progressBar
             min="0" 
             max="100"
             step="0.01"
             (input)="onSeek($event)"
             class="progress-slider" />
    </div>

    <!-- Buttons row -->
    <div class="controls-row">
      
      <!-- Left side: Play, Volume, Time -->
      <div class="controls-group left-group">
        <!-- Play / Pause -->
        <button class="control-btn" (click)="togglePlay()">
          <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24" *ngIf="!isPlaying">
            <path d="M8 5v14l11-7z" />
          </svg>
          <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24" *ngIf="isPlaying">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
          </svg>
        </button>

        <!-- Mute / Unmute -->
        <div class="volume-container">
          <button class="control-btn" (click)="toggleMute()">
            <!-- Muted -->
            <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24" *ngIf="isMuted || volume === 0">
              <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z" />
            </svg>
            <!-- Low Volume -->
            <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24" *ngIf="!isMuted && volume > 0 && volume <= 0.5">
              <path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z" />
            </svg>
            <!-- High Volume -->
            <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24" *ngIf="!isMuted && volume > 0.5">
              <path d="M3 9v6h4l5 5V4L9 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
            </svg>
          </button>
          
          <!-- Volume slider -->
          <input type="range" 
                 min="0" 
                 max="1" 
                 step="0.05" 
                 [value]="isMuted ? 0 : volume" 
                 (input)="onVolumeChange($event)"
                 class="volume-slider"
                 [style.background-size]="(isMuted ? 0 : (volume * 100)) + '% 100%'" />
        </div>

        <!-- Time tracker -->
        <span class="time-display" #timeDisplay>00:00 / 00:00</span>
      </div>

      <!-- Right side: Fullscreen -->
      <div class="controls-group right-group">
        <button class="control-btn" (click)="toggleFullscreen()">
          <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24">
            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
          </svg>
        </button>
      </div>

    </div>
  </div>
</div>
