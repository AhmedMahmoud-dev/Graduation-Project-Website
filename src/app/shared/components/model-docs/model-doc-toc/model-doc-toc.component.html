<!-- Desktop TOC (Vertical Timeline) -->
<aside
  class="hidden lg:block w-[224px] shrink-0 sticky top-28 self-start h-fit max-h-[calc(100vh-140px)] overflow-y-auto no-scrollbar py-4 pr-3 mr-4">
  <div class="relative">
    <!-- The vertical timeline track -->
    <div class="absolute left-[7px] top-[30px] bottom-2 w-px bg-[color:var(--border-color)] opacity-60"></div>

    <div
      class="text-[10px] font-black uppercase tracking-[0.2em] text-[color:var(--text-muted)] mb-4 pl-5 opacity-50 relative z-10">
      {{ sidebarLabel() }}
    </div>

    <div class="flex flex-col gap-0.5 relative z-10">
      @for (item of items(); track item.id) {
        <a [href]="'#' + item.id" (click)="scrollTo(item.id, $event)"
          class="toc-link group block py-2 pl-5 pr-3 text-[13px] font-medium relative text-[color:var(--text-muted)] transition-all outline-none"
          [class.toc-active]="activeId() === item.id">
          <div class="toc-indicator"></div>
          <span class="toc-link-text truncate block">{{ item.label }}</span>
        </a>
      }
    </div>
  </div>
</aside>

<!-- Mobile TOC (Dropdown Menu) -->
<nav
  class="lg:hidden sticky top-[64px] z-40 w-[calc(100%+2rem)] sm:w-[calc(100%+3rem)] self-start -mx-4 sm:-mx-6 mb-8 flex flex-col">
  <button (click)="toggleDropdown()"
    class="w-full flex items-center justify-between px-4 sm:px-6 py-3.5 font-bold text-[14px] text-[color:var(--text-primary)] outline-none cursor-pointer bg-[color:var(--bg-surface)]/90 backdrop-blur-md border-b border-[color:var(--border-color)]">
    <div class="flex items-center gap-3">
      <span class="text-[color:var(--brand-primary)]">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h7" />
        </svg>
      </span>
      <span>
        @for (item of items(); track item.id) {
          @if (activeId() === item.id) {
            {{ item.label }}
          }
        }
        @if (!activeId()) {
          {{ sidebarLabel() }}
        }
      </span>
    </div>
    <svg class="w-4 h-4 text-[color:var(--text-muted)] transition-transform duration-300"
      [class.rotate-180]="isMobileDropdownOpen" fill="none" viewBox="0 0 24 24" stroke="currentColor"
      stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </button>

  <!-- Absolutely positioned dropdown to prevent layout shifts when toggled -->
  @if (isMobileDropdownOpen) {
    <div
      class="absolute top-[100%] left-0 w-full flex flex-col border-b border-[color:var(--border-color)] bg-[color:var(--bg-surface)]/90 backdrop-blur-md px-4 sm:px-6 pt-2 pb-4 max-h-[60vh] overflow-y-auto no-scrollbar shadow-2xl">
      @for (item of items(); track item.id) {
        <a [href]="'#' + item.id" (click)="scrollTo(item.id, $event)"
          class="block px-3 py-2.5 mt-1 rounded-lg text-[13px] font-medium transition-all outline-none"
          [ngClass]="activeId() === item.id ? 'bg-[color:var(--brand-primary)]/10 text-[color:var(--brand-primary)] font-bold' : 'text-[color:var(--text-secondary)] hover:bg-[color:var(--bg-card)] hover:text-[color:var(--text-primary)]'">
          {{ item.label }}
        </a>
      }
    </div>
  }
</nav>
