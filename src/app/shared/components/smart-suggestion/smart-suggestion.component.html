@if (shouldShow() && suggestion()) {
  <div class="smart-suggestion-card border border-[color:var(--border-color)] shadow-xl" role="alert">
    <!-- Close Button -->
    <button (click)="dismiss()" class="close-btn flex items-center justify-center p-1 rounded-full hover:bg-[color:var(--bg-surface)] transition-colors" aria-label="Dismiss suggestion">
      <svg class="w-4 h-4 text-[color:var(--text-muted)] hover:text-[color:var(--text-primary)] transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>

    <div class="flex items-start gap-4">
      <!-- Icon Container -->
      <div class="icon-wrapper shrink-0 flex items-center justify-center w-10 h-10 rounded-xl bg-[color:var(--bg-primary)] border border-[color:var(--border-color)]">
        @switch (suggestion()?.type) {
          @case ('theme') {
            <!-- Palette icon -->
            <svg class="w-5 h-5 text-[color:var(--brand-primary)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
            </svg>
          }
          @case ('feedback') {
            <!-- Star icon -->
            <svg class="w-5 h-5 text-[color:var(--brand-primary)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.382-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" />
            </svg>
          }
          @case ('multimodal') {
            <!-- Sparkles icon -->
            <svg class="w-5 h-5 text-[color:var(--brand-primary)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
            </svg>
          }
          @case ('share') {
            <!-- Share icon -->
            <svg class="w-5 h-5 text-[color:var(--brand-primary)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.684 10.742l4.63-2.315a2 2 0 11.758 1.517l-4.63 2.316a2 2 0 01-1.517 0l-4.63-2.316a2 2 0 11.758-1.517l4.63 2.315z" />
            </svg>
          }
          @case ('compare') {
            <!-- Compare icon -->
            <svg class="w-5 h-5 text-[color:var(--brand-primary)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
          }
          @case ('notifications') {
            <!-- Bell icon -->
            <svg class="w-5 h-5 text-[color:var(--brand-primary)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
          }
          @case ('shortcuts') {
            <!-- Keyboard icon -->
            <svg class="w-5 h-5 text-[color:var(--brand-primary)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
            </svg>
          }
        }
      </div>

      <!-- Text Content -->
      <div class="flex-1 min-w-0 pr-4">
        <h4 class="text-sm font-semibold text-[color:var(--text-primary)] leading-tight mb-1 select-none">
          {{ suggestion()?.title }}
        </h4>
        <p class="text-xs text-[color:var(--text-secondary)] leading-relaxed select-none mb-3">
          {{ suggestion()?.description }}
        </p>

        <!-- Action Button -->
        <button (click)="executeAction()" class="action-btn text-xs font-semibold px-3 py-1.5 rounded-lg transition-all duration-200">
          {{ suggestion()?.actionLabel }}
        </button>
      </div>
    </div>
  </div>
}
