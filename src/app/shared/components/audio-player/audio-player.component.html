<div class="audio-player-container w-full">
  <!-- Hidden Audio Element -->
  <audio #audioElement [src]="src" (timeupdate)="onAudioTimeUpdate()" (play)="onAudioPlay()"
    (pause)="onAudioPause()" (ended)="onAudioEnded()" (loadedmetadata)="onAudioLoadedMetadata()" class="hidden"></audio>

  <!-- File Info Card -->
  <div class="file-info-row">
    <button (click)="togglePlayback()" class="btn-play">
      @if (!isPlaying()) {
      <svg class="w-4 h-4 ml-0.5" fill="currentColor" viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z" />
      </svg>
      }
      @if (isPlaying()) {
      <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
      </svg>
      }
    </button>
    <div class="file-info-meta min-w-0 flex-1">
      <div class="file-info-title">
        <h4 class="truncate border-none">{{ filename || 'Audio File' }}</h4>
      </div>
      <p class="file-info-detail">
        {{ formatDuration(currentTime()) }} / {{ formatDuration(duration()) }}
      </p>
    </div>
    @if (showRemoveButton) {
      <button (click)="onRemoveClick()" class="btn-remove">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    }
  </div>

  <!-- Waveform -->
  <div class="waveform-container mt-4" (click)="onWaveformClick($event)" title="Click to seek">
    <canvas #previewCanvas class="w-full"></canvas>
  </div>
</div>
