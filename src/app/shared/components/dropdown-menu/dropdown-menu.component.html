<div class="relative w-full h-full">
  <button type="button" (click)="toggle()" class="emotra-dropdown-trigger" [disabled]="disabled()">
    <span class="text-[color:var(--text-primary)] truncate">
      {{ selectedLabel }}
    </span>
    <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4 text-[color:var(--text-muted)] transition-transform duration-300"
      [class.rotate-180]="isOpen()" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
    </svg>
  </button>

  @if (isOpen()) {
  <div class="emotra-dropdown-menu animate-in fade-in slide-in-from-top-2 duration-200">
    @for (opt of options(); track opt.value) {
    <button type="button" (click)="selectOption(opt.value)" class="emotra-dropdown-item"
      [class.active]="selectedValue() === opt.value">
      {{ opt.label }}
      @if (selectedValue() === opt.value) {
      <svg class="w-4 h-4 ml-2 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
        <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
      }
    </button>
    }
  </div>
  }
</div>
