<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary Gradient -->
    <linearGradient id="grad1" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>

    <!-- Accent Gradient -->
    <linearGradient id="grad2" x1="100" y1="100" x2="400" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>

    <!-- Warm Accent -->
    <linearGradient id="grad3" x1="200" y1="150" x2="350" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>

    <!-- Cyan Accent -->
    <linearGradient id="grad4" x1="150" y1="200" x2="400" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#6C63FF"/>
    </linearGradient>

    <!-- Radial Glow -->
    <radialGradient id="glowCenter" cx="256" cy="256" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Outer Ring Gradient -->
    <linearGradient id="ringGrad" x1="50" y1="50" x2="462" y2="462" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#6C63FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0.6"/>
    </linearGradient>

    <!-- Soft Shadow -->
    <filter id="shadow1" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#6C63FF" flood-opacity="0.3"/>
    </filter>

    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#6C63FF" flood-opacity="0.2"/>
    </filter>

    <filter id="innerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip for brain hemisphere -->
    <clipPath id="leftHalf">
      <rect x="0" y="0" width="256" height="512"/>
    </clipPath>
    <clipPath id="rightHalf">
      <rect x="256" y="0" width="256" height="512"/>
    </clipPath>
  </defs>

  <!-- ========== BACKGROUND LAYERS ========== -->

  <!-- Ambient glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glowCenter)"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="256" r="230" stroke="url(#ringGrad)" stroke-width="1.5" fill="none" stroke-dasharray="8 12"/>

  <!-- Secondary ring -->
  <circle cx="256" cy="256" r="215" stroke="url(#ringGrad)" stroke-width="0.8" fill="none" opacity="0.4"/>


  <!-- ========== MAIN BRAIN SHAPE ========== -->
  <g filter="url(#shadow1)">

    <!-- Left hemisphere -->
    <path d="
      M 256 120
      C 220 120, 185 135, 165 160
      C 140 192, 130 225, 130 256
      C 130 290, 140 322, 160 348
      C 180 374, 215 392, 256 392
    " stroke="url(#grad1)" stroke-width="14" stroke-linecap="round" fill="none"/>

    <!-- Right hemisphere -->
    <path d="
      M 256 120
      C 292 120, 327 135, 347 160
      C 372 192, 382 225, 382 256
      C 382 290, 372 322, 352 348
      C 332 374, 297 392, 256 392
    " stroke="url(#grad1)" stroke-width="14" stroke-linecap="round" fill="none"/>

    <!-- Left inner fold 1 -->
    <path d="
      M 200 170
      C 175 195, 162 230, 162 256
      C 162 282, 172 310, 195 332
    " stroke="url(#grad2)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.7"/>

    <!-- Right inner fold 1 -->
    <path d="
      M 312 170
      C 337 195, 350 230, 350 256
      C 350 282, 340 310, 317 332
    " stroke="url(#grad2)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.7"/>

    <!-- Left inner fold 2 (deeper) -->
    <path d="
      M 218 200
      C 200 220, 192 240, 192 260
      C 192 280, 200 298, 215 312
    " stroke="url(#grad2)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.45"/>

    <!-- Right inner fold 2 (deeper) -->
    <path d="
      M 294 200
      C 312 220, 320 240, 320 260
      C 320 280, 312 298, 297 312
    " stroke="url(#grad2)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.45"/>

    <!-- Central divide line -->
    <line x1="256" y1="130" x2="256" y2="382" stroke="url(#grad1)" stroke-width="3" stroke-dasharray="6 8" opacity="0.25"/>
  </g>


  <!-- ========== AUDIO WAVEFORM (CENTER PULSE) ========== -->
  <g filter="url(#shadow2)">
    <path d="
      M 145 256
      L 180 256
      L 195 230
      L 210 280
      L 225 210
      L 240 300
      L 256 190
      L 272 310
      L 287 210
      L 302 280
      L 317 230
      L 332 256
      L 367 256
    " stroke="url(#grad3)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>


  <!-- ========== NEURAL NODES ========== -->

  <!-- Node connections (thin lines) -->
  <g opacity="0.3" stroke="url(#grad4)" stroke-width="1.5">
    <!-- Left network -->
    <line x1="155" y1="190" x2="185" y2="225"/>
    <line x1="185" y1="225" x2="170" y2="280"/>
    <line x1="170" y1="280" x2="190" y2="330"/>
    <line x1="155" y1="190" x2="190" y2="175"/>
    <line x1="185" y1="225" x2="220" y2="210"/>

    <!-- Right network -->
    <line x1="357" y1="190" x2="327" y2="225"/>
    <line x1="327" y1="225" x2="342" y2="280"/>
    <line x1="342" y1="280" x2="322" y2="330"/>
    <line x1="357" y1="190" x2="322" y2="175"/>
    <line x1="327" y1="225" x2="292" y2="210"/>

    <!-- Cross connections -->
    <line x1="220" y1="210" x2="292" y2="210"/>
    <line x1="190" y1="330" x2="322" y2="330"/>
  </g>

  <!-- Neural dots -->
  <g>
    <!-- Left side -->
    <circle cx="155" cy="190" r="5" fill="url(#grad4)" opacity="0.8"/>
    <circle cx="185" cy="225" r="4" fill="url(#grad4)" opacity="0.7"/>
    <circle cx="170" cy="280" r="4.5" fill="url(#grad4)" opacity="0.65"/>
    <circle cx="190" cy="330" r="4" fill="url(#grad4)" opacity="0.6"/>
    <circle cx="190" cy="175" r="3.5" fill="url(#grad4)" opacity="0.55"/>
    <circle cx="220" cy="210" r="3" fill="url(#grad4)" opacity="0.5"/>

    <!-- Right side -->
    <circle cx="357" cy="190" r="5" fill="url(#grad4)" opacity="0.8"/>
    <circle cx="327" cy="225" r="4" fill="url(#grad4)" opacity="0.7"/>
    <circle cx="342" cy="280" r="4.5" fill="url(#grad4)" opacity="0.65"/>
    <circle cx="322" cy="330" r="4" fill="url(#grad4)" opacity="0.6"/>
    <circle cx="322" cy="175" r="3.5" fill="url(#grad4)" opacity="0.55"/>
    <circle cx="292" cy="210" r="3" fill="url(#grad4)" opacity="0.5"/>
  </g>


  <!-- ========== OUTER ACCENT ARCS ========== -->
  <g opacity="0.35">
    <!-- Top-left arc -->
    <path d="M 140 150 A 160 160 0 0 1 210 105" stroke="url(#grad3)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Top-right arc -->
    <path d="M 372 150 A 160 160 0 0 0 302 105" stroke="url(#grad3)" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Bottom-left arc -->
    <path d="M 150 365 A 160 160 0 0 0 215 405" stroke="url(#grad4)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Bottom-right arc -->
    <path d="M 362 365 A 160 160 0 0 1 297 405" stroke="url(#grad4)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>


  <!-- ========== FLOATING PARTICLES ========== -->
  <g opacity="0.5">
    <circle cx="110" cy="150" r="2.5" fill="#A78BFA"/>
    <circle cx="402" cy="155" r="2" fill="#818CF8"/>
    <circle cx="95" cy="300" r="2" fill="#F472B6"/>
    <circle cx="415" cy="310" r="2.5" fill="#22D3EE"/>
    <circle cx="130" cy="380" r="1.8" fill="#A78BFA"/>
    <circle cx="382" cy="385" r="1.8" fill="#818CF8"/>
    <circle cx="256" cy="90" r="2.5" fill="#7C3AED"/>
    <circle cx="240" cy="420" r="2" fill="#F472B6"/>
    <circle cx="275" cy="415" r="1.5" fill="#22D3EE"/>
    <circle cx="120" cy="230" r="1.5" fill="#6C63FF"/>
    <circle cx="392" cy="240" r="1.5" fill="#6C63FF"/>
  </g>


  <!-- ========== BRAND TEXT ========== -->
  <text x="256" y="470" font-family="'Inter', 'Segoe UI', sans-serif" font-weight="800" font-size="42" fill="url(#grad1)" text-anchor="middle" letter-spacing="6">EMOTRA</text>

</svg>
